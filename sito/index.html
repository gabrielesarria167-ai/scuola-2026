    <h2>Il <a href="https://it.wikipedia.org" target="_blank">PLA</a></h2>
    <p>Il <strong>PLA</strong> (Acido polilattico) è un tipo di plastica biodegradabile derivata da risorse rinnovabili
        come il mais o la canna da zio.</p>
    <p>Il PLA è ampiamente utilizzato nella stampa 3D per la sua facilità d'uso, bassa temperatura di stampa e
        biodegradabilità, rendendolo una scelta popolare per i principianti e per progetti che non richiedono alta
        resistenza meccanica.</p>
    <h2>Il PLA+ e Il PLA Pro</h2>
    <p>Il <strong>PLA+</strong> e il <strong>PLA Pro</strong> sono varianti migliorate del PLA, con caratteristiche come
        maggiore resistenza e flessibilità, rendendoli adatti per applicazioni più esigenti.</p>
    <h2>Il PETG</h2>
    <p>Il <strong>PETG</strong> (Polietilene tereftalato glicole) è un tipo di plastica resistente e adatta per
        applicazioni che richiedono alte prestazioni meccaniche.</p>
    <h2>Il PP</h2>
    <p>Il <strong>PP</strong> (Polipropilene) è un tipo di plastica flessibile e leggera, comunemente utilizzata per la
        produzione di contenitori e pezzi per stampanti 3D.</p>
    <h2>L'ABS</h2>
    <p>l <strong>ABS</strong> (Acrylonitrile Butadiene Styrene) è un tipo di plastica resistente e flessibile,
        comunemente utilizzata per la produzione di pezzi per stampanti 3D.</p>
